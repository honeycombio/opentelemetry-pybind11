[build-system]
requires = ["setuptools>=45", "wheel", "cmake>=3.15", "pybind11>=2.10.0"]
build-backend = "setuptools.build_meta"

[project]
authors = [
  {name = "Alex Boten", email = "alexboten@honeycomb.io"},
]
name = "opentelemetry-pybind11"
version = "0.1.0"
description = "Python bindings for OpenTelemetry C++ SDK"
readme = "README.md"
requires-python = ">=3.7"
license = {text = "Apache-2.0"}

[project.urls]
Homepage = "https://github.com/honeycombio/opentelemetry-pybind11"
