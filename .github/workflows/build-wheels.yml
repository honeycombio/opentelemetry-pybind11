name: Build Wheels

env:
  CPP_VERSION: "1.26.0"
  CURL_VERSION: "8.4.0"
  OTEL_PROTO_VERSION: "1.10.0"
  PROTO_VERSION: "3.21.12"
  JSON_VERSION: "3.12.0"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build ${{ matrix.python_version }} wheels on (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python_version: ["cp310-*", "cp311-*", "cp312-*", "cp313-*", "cp314-*"]
        os: [ubuntu-latest, ubuntu-24.04-arm]
        include:
          - os: macos-15-intel
            macosx_deployment_target: "15.0"
            python_version: "cp314-*"
          - os: macos-14
            macosx_deployment_target: "14.0"
            python_version: "cp314-*"

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/cache@v5
        with:
          path: .cibw-cache/${{ matrix.os }}
          key: cibw-otel-deps-curl-${{ env.CURL_VERSION }}-protobuf-${{ env.PROTO_VERSION }}-json-${{ env.JSON_VERSION }}-otel-${{ env.CPP_VERSION }}-v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: ${{ matrix.python_version }}
          ARCH: /${{ matrix.os }}
          CPP_VERSION: ${{ env.CPP_VERSION }}
          CURL_VERSION: ${{ env.CURL_VERSION }}
          OTEL_PROTO_VERSION: ${{ env.OTEL_PROTO_VERSION }}
          PROTO_VERSION: ${{ env.PROTO_VERSION }}
          JSON_VERSION: ${{ env.JSON_VERSION }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
          PIP_ONLY_BINARY: cmake
          CIBW_CONTAINER_ENGINE: "docker; create_args: -v ${{ github.workspace }}/.cibw-cache:/cibw-cache:rw"

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  merge_wheels:
    name: Merge wheel artifacts
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-wheels
          pattern: wheels-*
          merge-multiple: true

      - name: Upload merged wheels
        uses: actions/upload-artifact@v7
        with:
          name: all-wheels
          path: all-wheels/*.whl
          if-no-files-found: error

      - name: List wheels
        run: ls -lh all-wheels/

  publish:
    name: Publish to PyPI
    needs: [merge_wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/honeycomb-pycpp
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v7
        with:
          name: all-wheels
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
