name: Build Wheels

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: macos-15-intel
            macosx_deployment_target: "15.0"
            arch: x86_64
          - os: macos-14
            macosx_deployment_target: "14.0"
            arch: arm64

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/cache@v5
        with:
          path: .cibw-cache/${{ matrix.arch }}
          key: cibw-otel-deps-curl-8.4.0-protobuf-3.21.12-json-3.11.3-otel-1.26.0-v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  merge_wheels:
    name: Merge wheel artifacts
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-wheels
          pattern: wheels-*
          merge-multiple: true

      - name: Upload merged wheels
        uses: actions/upload-artifact@v7
        with:
          name: all-wheels
          path: all-wheels/*.whl
          if-no-files-found: error

      - name: List wheels
        run: ls -lh all-wheels/

  publish:
    name: Publish to PyPI
    needs: [merge_wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/honeycomb-pycpp
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v7
        with:
          name: all-wheels
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
