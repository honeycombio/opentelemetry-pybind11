name: Build Wheels

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build_linux_wheels:
    name: Build wheels on Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-latest  # Change to 'ubuntu-latest-arm' if you have access to ARM64 runners

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Set up QEMU for cross-compilation (only needed when using x86_64 runner for ARM builds)
      # Comment out this step if using native ARM64 runners
      - name: Set up QEMU
        if: matrix.arch == 'aarch64' && matrix.runner != 'ubuntu-latest-arm'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Cache Linux build deps
        uses: actions/cache@v4
        with:
          path: .cibw-cache/${{ matrix.arch }}
          key: cibw-otel-deps-curl-8.4.0-protobuf-3.21.12-json-3.11.3-otel-1.25.0-${{ matrix.arch }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.4
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_macos_wheels:
    name: Build wheels on macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: macos-13
          - arch: arm64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install OpenTelemetry C++
        run: |
          brew update
          brew install opentelemetry-cpp

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.4
        env:
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  merge_wheels:
    name: Merge wheel artifacts
    needs: [build_linux_wheels, build_macos_wheels]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-wheels
          pattern: wheels-*
          merge-multiple: true

      - name: Upload merged wheels
        uses: actions/upload-artifact@v4
        with:
          name: all-wheels
          path: all-wheels/*.whl
          if-no-files-found: error

      - name: List wheels
        run: ls -lh all-wheels/
